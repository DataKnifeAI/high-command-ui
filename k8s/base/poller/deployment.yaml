# Data collector - polls Hell Divers 2 API and writes to PostgreSQL.
# Runs separately from API (API is read-only). One replica sufficient.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: high-command-poller
  namespace: high-command
  labels:
    app: high-command-poller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: high-command-poller
  template:
    metadata:
      labels:
        app: high-command-poller
    spec:
      containers:
      - name: poller
        image: harbor.dataknife.net/library/high-command-api:v0.19
        imagePullPolicy: Always
        env:
        - name: MODE
          value: "collector"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: LOG_LEVEL
          value: "INFO"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: high-command-poller-secrets
              key: database-url
        - name: HELLDIVERS_API_BASE
          valueFrom:
            secretKeyRef:
              name: high-command-poller-secrets
              key: helldivers-api-base
        - name: HELLDIVERS_API_CLIENT_NAME
          valueFrom:
            secretKeyRef:
              name: high-command-poller-secrets
              key: helldivers-api-client-name
        - name: HELLDIVERS_API_CONTACT
          valueFrom:
            secretKeyRef:
              name: high-command-poller-secrets
              key: helldivers-api-contact
        - name: SCRAPE_INTERVAL
          valueFrom:
            secretKeyRef:
              name: high-command-poller-secrets
              key: scrape-interval
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
