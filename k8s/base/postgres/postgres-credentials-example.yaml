# PostgreSQL credentials. Create with kubectl before postgres-cluster:
#   kubectl create secret generic high-command-postgres-credentials \
#     --from-literal=username=highcommand \
#     --from-literal=password='$(openssl rand -base64 32)' \
#     -n high-command
#
# Do not apply this file with real passwords. Use kubectl create.
apiVersion: v1
kind: Secret
metadata:
  name: high-command-postgres-credentials
  namespace: high-command
type: Opaque
stringData:
  username: highcommand
  password: "REPLACE_VIA_KUBECTL_CREATE"
